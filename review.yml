      interactive documentation, but access to actual endpoints is gated behind
      an approval workflow with App Key/secret credentials, so base URLs were
      not published. The portal home, catalog, and individual product pages all
      resolved live (HTTP 200). UCLA Library exposes IIIF-compliant digital
      collections manifests. The developer-pilot portal did not resolve from
      outside the network (treated as 0). Official GitHub org (github.com/ucla)
      and UCLA Library org verified live. No public endpoints were fabricated;
      gated and unreachable resources are recorded honestly.
