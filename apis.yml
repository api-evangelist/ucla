---
aid: ucla
name: University of California, Los Angeles
description: >-
  The University of California, Los Angeles (UCLA) is a public land-grant
  research university in Los Angeles, California, ranked #30 in the QS World
  University Rankings 2025. UCLA operates a centralized API Developer Portal
  (developer.api.ucla.edu) that publishes a catalog of campus APIs covering
  student information systems, course and class data, the Registrar data
  dictionary, MyUCLA menu data, and enterprise integration services. Most
  products are interactive-documented but gated behind an access request and
  approval workflow with App Key/secret credentials. UCLA Library additionally
  exposes IIIF-compliant digital collections manifests for image
  interoperability.
